version: "3.8"

# ═══════════════════════════════════════════════
#  AETHORIA — Companion App Stack
#  Ollama läuft auf dem Host mit OLLAMA_ORIGINS=*
#
#  Portainer Environment Variables:
#    APP_PORT     → Web-App Port   (default: 8080)
#    OLLAMA_URL   → Ollama URL     (default: http://host.docker.internal:11434)
#    OLLAMA_MODEL → Modell         (default: llama3.1:8b)
# ═══════════════════════════════════════════════

services:
  aethoria-companion:
    build:
      context: https://github.com/DEIN-USER/aethoria-stack.git#main
      dockerfile: Dockerfile
      no_cache: false
    container_name: aethoria-companion
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
