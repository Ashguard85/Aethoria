server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript;

    # Kein Cache für index.html (damit Updates sofort wirken)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Statische Assets cachen
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Fallback für SPA (falls später React/Vue)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health-Check Endpoint für Portainer/Monitoring
    location /health {
        access_log off;
        return 200 '{"status":"ok","app":"aethoria-companion"}';
        add_header Content-Type application/json;
    }
}
